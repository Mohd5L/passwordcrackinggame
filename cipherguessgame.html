<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="description" content="Interactive Cryptography and Cipher CTF Challenge.">
    <meta property="og:title" content="GUtech Security Lab // Cipher Challenge">
    <meta property="og:description" content="Test your decryption skills with Caesar shifts and frequency analysis.">
    <meta property="og:type" content="website">
    
    <title>GUtech // Cipher Challenge</title>
    <style>
        :root {
            --gutech-red: #b22222;
            --gutech-red-hover: #8b0000;
            --light-grey: #f5f5f5;
            --medium-grey: #e2e8f0;
            --dark-grey: #475569;
            --text-main: #1e293b;
            --white: #ffffff;
            --success: #16a34a;
            --terminal-bg: #1e1e1e;
            --terminal-text: #00ff00;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--light-grey);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--white);
            padding: 35px;
            border-radius: 6px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-top: 8px solid var(--gutech-red);
        }

        .header {
            margin-bottom: 25px;
            border-bottom: 2px solid var(--medium-grey);
            padding-bottom: 15px;
        }

        h1 {
            margin: 0;
            color: var(--gutech-red);
            font-size: 1.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .setup-section {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        select {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid var(--medium-grey);
            border-radius: 4px;
            background: var(--white);
            font-size: 1rem;
            cursor: pointer;
        }

        button {
            padding: 12px 24px;
            background-color: var(--gutech-red);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: var(--gutech-red-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Game UI */
        .display-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--dark-grey);
            margin-bottom: 8px;
            display: block;
            letter-spacing: 0.5px;
        }

        .cipher-window {
            background: var(--terminal-bg);
            color: var(--terminal-text);
            padding: 25px;
            border-radius: 6px;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            margin-bottom: 20px;
            word-break: break-all;
            text-align: center;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }

        .hint-text {
            color: var(--gutech-red);
            background: #fff5f5;
            padding: 15px;
            border-left: 4px solid var(--gutech-red);
            border-radius: 0 4px 4px 0;
            font-size: 0.95rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 12px 15px;
            border: 2px solid var(--medium-grey);
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
            font-family: 'Courier New', Courier, monospace;
            transition: border-color 0.2s ease;
        }

        input[type="text"]:focus {
            border-color: var(--gutech-red);
            box-shadow: 0 0 0 3px rgba(178, 34, 34, 0.1);
        }

        .footer-info {
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid var(--medium-grey);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: var(--dark-grey);
        }

        #feedback {
            font-weight: bold;
            text-transform: uppercase;
        }

        .hidden { display: none !important; }

        /* Shake animation for incorrect guesses */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .shake {
            animation: shake 0.3s ease-in-out;
        }
    </style>
</head>
<body>

<main class="container">
    <header class="header">
        <h1>GUtech Security Lab</h1>
    </header>

    <section class="setup-section">
        <select id="levelSelect" aria-label="Select Difficulty Level">
            <option value="1">Level 1: Caesar Shift</option>
            <option value="2">Level 2: Substitution (Key Hint)</option>
            <option value="3">Level 3: Frequency Analysis</option>
            <option value="4">Level 4: Blackout (No Hints)</option>
        </select>
        <button onclick="startGame()">Initialize Target</button>
    </section>

    <section id="gameArea" class="hidden" aria-live="polite">
        <span class="display-label">TARGET ENCRYPTION:</span>
        <div class="cipher-window" id="encryptedDisplay" aria-label="Encrypted Flag"></div>

        <div id="hintArea" class="hint-text hidden" aria-label="Hint"></div>

        <form class="input-group" onsubmit="checkGuess(event)">
            <input type="text" id="userGuess" placeholder="gutech{flag_here}" autocomplete="off" spellcheck="false" required>
            <button type="submit">Verify</button>
        </form>

        <footer class="footer-info">
            <span>Attempts: <span id="guessCount" style="color: var(--gutech-red); font-weight: bold;">0</span></span>
            <span id="feedback"></span>
        </footer>
    </section>
</main>

<script>
    const phrases = [
        "CYBERSECURITY",
        "BLOCKCHAIN",
        "DATABASE",
        "PROGRAMMING",
        "ALGORITHM",
        "GUTECHLABS",
        "NETWORK",
        "CRYPTOGRAPHY",
        "PENETRATION",
        "FORENSICS",
        "VULNERABILITY"
    ];

    let targetFlag = "";
    let guesses = 0;
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

    function startGame() {
        const level = document.getElementById("levelSelect").value;
        const rawPhrase = phrases[Math.floor(Math.random() * phrases.length)];
        
        targetFlag = `gutech{${rawPhrase}}`;
        guesses = 0;
        
        // Reset UI state
        document.getElementById("guessCount").innerText = guesses;
        document.getElementById("feedback").innerText = "";
        const guessInput = document.getElementById("userGuess");
        guessInput.value = "";
        guessInput.classList.remove("shake");
        
        document.getElementById("gameArea").classList.remove("hidden");

        const cipherMap = generateCipher(level);
        
        // Encrypt only the inner payload
        const encryptedInner = rawPhrase.split('').map(char => {
            return alphabet.includes(char) ? cipherMap[char] : char;
        }).join('');
        
        document.getElementById("encryptedDisplay").innerText = `gutech{${encryptedInner}}`;
        provideHints(level, cipherMap, rawPhrase);
        
        // Auto-focus input for better UX
        guessInput.focus();
    }

    function generateCipher(level) {
        const map = {};
        if (level === "1") {
            const shift = Math.floor(Math.random() * 25) + 1;
            alphabet.forEach((char, i) => {
                map[char] = alphabet[(i + shift) % 26];
            });
        } else {
            const shuffled = [...alphabet].sort(() => Math.random() - 0.5);
            alphabet.forEach((char, i) => {
                map[char] = shuffled[i];
            });
        }
        return map;
    }

    function provideHints(level, map, original) {
        const hintArea = document.getElementById("hintArea");
        
        if (level === "1") {
            hintArea.innerText = "[!] System Log: A uniform linear shift (Caesar) was detected.";
            hintArea.classList.remove("hidden");
        } else if (level === "2") {
            const char = original[0];
            hintArea.innerText = `[!] Decryption Key Fragment: The plaintext letter '${char}' maps to ciphertext '${map[char]}'`;
            hintArea.classList.remove("hidden");
        } else if (level === "3") {
            const counts = {};
            original.split('').forEach(c => {
                counts[map[c]] = (counts[map[c]] || 0) + 1;
            });
            const topChar = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
            hintArea.innerText = `[!] Frequency Analysis: '${topChar}' is the most commonly occurring character in the ciphertext.`;
            hintArea.classList.remove("hidden");
        } else {
            hintArea.classList.add("hidden");
        }
    }

    function checkGuess(event) {
        // Prevent form from refreshing the page
        event.preventDefault(); 
        
        const guessInput = document.getElementById("userGuess");
        // Remove accidental whitespace from ends
        const guess = guessInput.value.trim(); 
        
        if (!guess) return;

        guesses++;
        document.getElementById("guessCount").innerText = guesses;

        const feedback = document.getElementById("feedback");
        
        // Remove shake class to re-trigger animation if they guess wrong multiple times
        guessInput.classList.remove("shake");
        // Trigger reflow
        void guessInput.offsetWidth; 

        if (guess.toLowerCase() === targetFlag.toLowerCase()) {
            feedback.innerText = "SUCCESS: ACCESS GRANTED";
            feedback.style.color = "var(--success)";
            
            setTimeout(() => {
                alert(`Excellent work! Flag captured in ${guesses} attempts.`);
                startGame();
            }, 100);
        } else {
            feedback.innerText = "DENIED: INVALID FLAG";
            feedback.style.color = "var(--gutech-red)";
            // Trigger visual shake feedback
            guessInput.classList.add("shake"); 
        }
    }
</script>

</body>
</html>
